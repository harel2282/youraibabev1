    function pickSenders(list) {
      const arr = Array.isArray(list) ? list : [];
      const ids = arr.map((p) => p.id);
      for (let i = ids.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = ids[i]; ids[i] = ids[j]; ids[j] = t; }
      return new Set(ids.slice(0, Math.round(arr.length / 3)));
    }
    const openerFor = (id) => { const p = PROFILE_INDEX[id]; const arr = (p && p.lang === "he") ? OPENERS_HE : OPENERS; return arr[(id - 1) % arr.length]; };

    // ── "She texts first" persistence ──
    // The ~1/3 of girls who message first is rolled once at random, then saved in this browser so a
    // refresh never re-rolls it. Keyed per user when logged in, and "guest" before login (so it works
    // even before sign-in). As the catalog grows/shrinks, the saved set is topped up / trimmed so the
    // 1/3 ratio keeps holding, while existing picks stay put.
    const SENDERS_KEY = "yab_senders";
    function sendersKey(userId) { return SENDERS_KEY + "__" + (userId ? userId : "guest"); }
    function readSenders(userId) {
      try {
        var r = localStorage.getItem(sendersKey(userId));
        if (!r) return null;
        var arr = JSON.parse(r);
        if (!Array.isArray(arr)) return null;
        var out = [];
        for (var i = 0; i < arr.length; i++) { var n = parseInt(arr[i], 10); if (!isNaN(n)) out.push(n); }
        return out;
      } catch (e) { return null; }
    }
    function writeSenders(userId, ids) { try { localStorage.setItem(sendersKey(userId), JSON.stringify(ids)); } catch (e) {} }
    function resolveSenders(list, userId) {
      var arr = Array.isArray(list) ? list : [];
      var allIds = arr.map(function (p) { return p.id; });
      if (allIds.length === 0) return new Set();
      var allSet = new Set(allIds);
      var target = Math.round(allIds.length / 3);

      var saved = readSenders(userId);
      var changed = false;

      // First time for this identity. If a logged-in user already has a guest selection on this
      // browser, inherit it so the set doesn't visibly jump right after logging in.
      if (saved == null) {
        if (userId) { var g = readSenders(null); if (g && g.length) saved = g; }
        if (saved == null) saved = Array.from(pickSenders(arr));
        changed = true;
      }

      // Drop any saved ids that no longer exist in the catalog.
      var keep = saved.filter(function (id) { return allSet.has(id); });
      if (keep.length !== saved.length) changed = true;

      // Keep the ~1/3 ratio as the catalog changes (existing picks are preserved).
      if (keep.length < target) {
        var keepSet = new Set(keep);
        var pool = allIds.filter(function (id) { return !keepSet.has(id); });
        for (var i = pool.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = pool[i]; pool[i] = pool[j]; pool[j] = t; }
        keep = keep.concat(pool.slice(0, target - keep.length));
        changed = true;
      } else if (keep.length > target) {
        keep = keep.slice(0, target);
        changed = true;
      }

      if (changed) writeSenders(userId, keep);
      return new Set(keep);
    }

    // that — which includes her opener for a brand-new match the user hasn't opened yet.
    const CHATREADS_KEY = "yab_chatreads";
    function chatreadsKey(userId) { return CHATREADS_KEY + "__" + (userId ? userId : "guest"); }
    function readChatReads(userId) {
      try { var r = localStorage.getItem(chatreadsKey(userId)); if (!r) return {}; var o = JSON.parse(r); return (o && typeof o === "object") ? o : {}; } catch (e) { return {}; }

      el.style.boxShadow = `${REST_SHADOW}, 0 0 ${44 * a}px ${5 * a}px rgba(${rgb},${0.6 * a})`;

    function ProfileImage({ profile }) {
      const src = mediaOf(profile.id);
      const poster = posterOf(profile.id);
      const vref = useRef(null);
      useEffect(() => {
        const v = vref.current;
        if (!v || !src) return;
        v.muted = true;
        const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
        // Mobile browsers can drop the decoded video when the app is backgrounded,
        // leaving a frozen poster. Reload and resume when we return to the foreground.
        const reload = () => { try { v.load(); } catch (e) {} v.addEventListener("canplay", tryPlay, { once: true }); tryPlay(); };
        tryPlay();
        v.addEventListener("canplay", tryPlay, { once: true });
        const onVis = () => { if (document.visibilityState === "visible") reload(); };
        document.addEventListener("visibilitychange", onVis);
        window.addEventListener("pageshow", reload);
        window.addEventListener("focus", tryPlay);
        return () => {
          v.removeEventListener("canplay", tryPlay);
          document.removeEventListener("visibilitychange", onVis);
          window.removeEventListener("pageshow", reload);
          window.removeEventListener("focus", tryPlay);
        };
      }, [src]);
      return (
        <video ref={vref} src={src} poster={poster} autoPlay loop muted playsInline preload="auto"
          draggable="false" style={{ backgroundColor: "#18181b", objectPosition: videoPos(profile) }}
          className="absolute inset-0 h-full w-full object-cover" />
      );
    }

    /* ------------------------- Swipe card ------------------------- */
    function SwipeCard({ profile, depth, isTop, leaveDir, enterFrom, onSwipe, onLeft, onTap }) {
      const ref = useRef(null);
      const drag = useRef({ active: false, moved: false, startX: 0, x: 0, lastX: 0, lastT: 0, v: 0 });
      const rest = stackTransform(Math.min(depth, 2));

      useLayoutEffect(() => {
        if (!enterFrom) return;
        const el = ref.current;
        if (!el) return;
        const sign = enterFrom === "right" ? 1 : -1;
        el.style.transition = "none";
        el.style.transform = `translateX(${sign * FLY_OUT}px) rotate(${sign * 16}deg)`;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.transition = "transform .42s cubic-bezier(.2,.8,.25,1)";
          el.style.transform = rest;
        }));
      }, []);

      useEffect(() => {
        if (!leaveDir) return;
        const el = ref.current;
        if (!el) return;
        const sign = leaveDir === "right" ? 1 : -1;
        el.style.transition = "transform .34s cubic-bezier(.4,0,.2,1), opacity .34s ease, box-shadow .2s ease";
        requestAnimationFrame(() => {
          el.style.transform = `translateX(${sign * FLY_OUT}px) rotate(${sign * 20}deg)`;
          el.style.opacity = "0";
          paintLeave(el, leaveDir);
        });
        const done = () => onLeft(profile.id);
        el.addEventListener("transitionend", done, { once: true });
        const safety = setTimeout(done, 480);
        return () => { clearTimeout(safety); el.removeEventListener("transitionend", done); };
      }, [leaveDir]);

      const down = (e) => {
        if (!isTop || leaveDir) return;
        const el = ref.current, s = drag.current;
        s.active = true; s.moved = false; s.startX = e.clientX; s.x = 0;
        s.lastX = e.clientX; s.lastT = performance.now(); s.v = 0;
        el.style.transition = "none";
        try { el.setPointerCapture(e.pointerId); } catch (_) {}
      };
      const move = (e) => {
        const s = drag.current;
        if (!s.active) return;
        const dx = e.clientX - s.startX;
        if (Math.abs(dx) > 6) s.moved = true;
        s.x = dx;
        paintDrag(ref.current, dx);
        const now = performance.now(), dt = now - s.lastT;
        if (dt > 0) s.v = ((e.clientX - s.lastX) / dt) * 1000;
        s.lastX = e.clientX; s.lastT = now;
      };
      const up = () => {
        const s = drag.current;
        if (!s.active) return;
        s.active = false;
        const el = ref.current, dx = s.x, v = s.v;
        if (dx > SWIPE_DISTANCE || v > SWIPE_VELOCITY) { onSwipe("right"); return; }
        if (dx < -SWIPE_DISTANCE || v < -SWIPE_VELOCITY) { onSwipe("left"); return; }
        if (!s.moved && onTap) { onTap(); return; }
        el.style.transition = "transform .3s cubic-bezier(.2,.85,.25,1), box-shadow .25s ease";
        el.style.transform = rest;
        paintRest(el);
      };

      return (
        <div ref={ref} onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
          style={{ transform: rest, boxShadow: REST_SHADOW, touchAction: "none", zIndex: leaveDir ? 50 : 30 - depth,
                   transition: "transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease, opacity .3s ease" }}
          className={"absolute inset-0 select-none overflow-hidden rounded-[28px] bg-zinc-900 " + (isTop && !leaveDir ? "cursor-grab active:cursor-grabbing" : "pointer-events-none")}>
          <ProfileImage profile={profile} />
          <div className="pointer-events-none absolute inset-0 bg-gradient-to-t from-black via-black/35 to-transparent" />
          <div className="pointer-events-none absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-black/50 to-transparent" />
          <div data-stamp="like" style={{ opacity: 0, transition: "opacity .15s ease", textShadow: "0 0 18px rgba(255,0,127,.8)" }}
            className="absolute left-6 top-9 -rotate-[18deg] rounded-lg border-[3px] border-[#FF007F] px-4 py-1 font-display text-4xl font-bold tracking-wider text-[#FF007F]">{tr("LIKE")}</div>
          <div data-stamp="nope" style={{ opacity: 0, transition: "opacity .15s ease", textShadow: "0 0 18px rgba(0,229,255,.8)" }}
            className="absolute right-6 top-9 rotate-[18deg] rounded-lg border-[3px] border-[#00E5FF] px-4 py-1 font-display text-4xl font-bold tracking-wider text-[#00E5FF]">{tr("NOPE")}</div>
          <div className="absolute inset-x-0 bottom-0 p-6 pb-7">
            <div className="flex items-end gap-2">
              <h2 className="font-display text-4xl font-bold leading-none text-white">{profile.name}</h2>
              <span className="pb-[2px] text-3xl font-light text-white/85">{profile.age}</span>

            <p className="mt-1.5 flex items-center gap-1.5 text-sm text-white/55">

            </p>
            <p className="mt-3 line-clamp-2 text-[15px] leading-snug text-white/85">{profile.bio}</p>

    /* --------------------------- Home --------------------------- */
    function HomeScreen({ onLike, onUndoLike, onOpenDetail, active, profiles, loading }) {
      const [stack, setStack] = useState(profiles);
      const [leaving, setLeaving] = useState([]);
      const [history, setHistory] = useState([]);
      const [enter, setEnter] = useState(null);
      // When the database girls finish loading, refresh the deck with the full list.
      useEffect(() => { setStack(profiles); setLeaving([]); setHistory([]); setEnter(null); }, [profiles]);
      const leavingIds = new Set(leaving.map((l) => l.id));
      const live = stack.filter((p) => !leavingIds.has(p.id));
      const topId = live[0] ? live[0].id : null;
      const empty = stack.length === 0;

      const swipe = (dir) => {
        const lvIds = new Set(leaving.map((l) => l.id));
        const top = stack.find((p) => !lvIds.has(p.id));
        if (!top) return;
        setLeaving((prev) => [...prev, { id: top.id, dir }]);
        setHistory((prev) => [...prev, { profile: top, dir }]);
        if (dir === "right") onLike(top);
      };
      const onLeft = (id) => {
        setStack((prev) => prev.filter((p) => p.id !== id));
        setLeaving((prev) => prev.filter((l) => l.id !== id));
      };
      const rewind = () => {
        if (!history.length) return;
        const last = history[history.length - 1];
        setHistory((prev) => prev.slice(0, -1));
        setStack((prev) => [last.profile, ...prev.filter((p) => p.id !== last.profile.id)]);
        setEnter({ id: last.profile.id, dir: last.dir });
        if (last.dir === "right") onUndoLike(last.profile.id);
        setTimeout(() => setEnter(null), 500);
      };
      const reset = () => { setStack(profiles); setLeaving([]); setHistory([]); setEnter(null); };

      useEffect(() => {
        const onKey = (e) => {
          if (!active) return;
          if (e.key === "ArrowRight") swipe("right");
          if (e.key === "ArrowLeft") swipe("left");
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [stack, leaving, active]);

      const rendered = stack.slice(0, leaving.length + 3);

      return (
        <div className="flex h-full flex-col">
          <div className="relative flex-1 px-3 pt-1 pb-1">
            <div className="relative h-full w-full">
              {rendered.map((profile) => {
                const lv = leaving.find((l) => l.id === profile.id);
                const depth = lv ? 0 : live.indexOf(profile);
                return <SwipeCard key={profile.id} profile={profile} depth={depth} isTop={!lv && profile.id === topId}
                  leaveDir={lv ? lv.dir : null} enterFrom={enter && enter.id === profile.id ? enter.dir : null}
                  onSwipe={swipe} onLeft={onLeft} onTap={() => onOpenDetail(profile)} />;
              })}
              {empty && (loading
                ? <div className="absolute inset-0 flex flex-col items-center justify-center gap-3 text-white/50"><div className="h-9 w-9 animate-spin rounded-full border-2 border-white/15 border-t-[#FF007F]" /><span className="text-sm">{tr("Loading profiles…")}</span></div>
                : <DeckEmpty onReset={reset} />)}
            </div>
          </div>
          <div className="flex shrink-0 items-center justify-center gap-5 py-3">
            <ActionButton icon={<RewindIcon />} color={GOLD} size={52} onClick={rewind} disabled={!history.length} label={tr("Rewind last swipe")} />
            <ActionButton icon={<NopeIcon />} color={CYAN} size={66} onClick={() => swipe("left")} disabled={empty} label={tr("Nope")} />
            <ActionButton icon={<LikeIcon />} color={PINK} size={66} onClick={() => swipe("right")} disabled={empty} label={tr("Like")} />
          </div>
        </div>
      );
    }

    /* --------------------------- Chats --------------------------- */
    /* ---------------- Live camera ---------------- */
    function CameraCapture({ onClose, onCapture, onGallery }) {
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const recRef = useRef(null);
      const chunksRef = useRef([]);
      const [facing, setFacing] = useState("environment");
      const [mode, setMode] = useState("photo");
      const [recording, setRecording] = useState(false);
      const [error, setError] = useState(null);
      const canRecord = typeof window !== "undefined" && typeof window.MediaRecorder !== "undefined";

      const stop = () => { if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; } };
      const begin = (face) => {
        stop();
        const md = navigator.mediaDevices;
        if (!md || !md.getUserMedia) { setError("Camera isn't available in this browser."); return; }
        md.getUserMedia({ video: { facingMode: face }, audio: true })
          .catch(() => md.getUserMedia({ video: { facingMode: face }, audio: false }))
          .then((stream) => {
            streamRef.current = stream;
            if (videoRef.current) { videoRef.current.srcObject = stream; const p = videoRef.current.play(); if (p && p.catch) p.catch(() => {}); }
            setError(null);
          })
          .catch(() => setError("Can't access the camera. Allow camera permission, or pick from your gallery instead."));
      };
      useEffect(() => { begin("environment"); return stop; }, []);

      const flip = () => { const n = facing === "environment" ? "user" : "environment"; setFacing(n); begin(n); };
      const finish = (blob) => { onCapture(blob); stop(); onClose(); };
      const snap = () => {
        const v = videoRef.current; if (!v || !v.videoWidth) return;
        const c = document.createElement("canvas");
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext("2d").drawImage(v, 0, 0, c.width, c.height);
        c.toBlob((b) => { if (b) finish(b); }, "image/jpeg", 0.9);
      };
      const startRec = () => {
        const s = streamRef.current; if (!s) return;
        chunksRef.current = [];
        let rec;
        try { rec = new MediaRecorder(s, { mimeType: "video/webm" }); } catch (e) { try { rec = new MediaRecorder(s); } catch (e2) { return; } }
        rec.ondataavailable = (ev) => { if (ev.data && ev.data.size) chunksRef.current.push(ev.data); };
        rec.onstop = () => finish(new Blob(chunksRef.current, { type: rec.mimeType || "video/webm" }));
        recRef.current = rec; rec.start(); setRecording(true);
      };
      const stopRec = () => { if (recRef.current && recRef.current.state !== "inactive") recRef.current.stop(); setRecording(false); };
      const shutter = () => { if (mode === "photo") snap(); else if (recording) stopRec(); else startRec(); };
      const close = () => { if (recording && recRef.current) { try { recRef.current.stop(); } catch (e) {} } stop(); onClose(); };

      return (
        <div className="absolute inset-0 z-[60] flex flex-col bg-black">
          {error ? (
            <div className="flex flex-1 flex-col items-center justify-center px-10 text-center">
              <div className="mb-4 text-[#FF007F]"><CameraIcon /></div>

    // European/Israeli-style ringback (425 Hz, 1s on / 4s off) generated with Web Audio.
    function makeRingback() {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return { start: function () {}, stop: function () {} };
      var ctx = null, gain = null, osc = null, loop = null, stopped = true;
      function beep() {
        if (stopped || !ctx) return;
        var now = ctx.currentTime;
        gain.gain.cancelScheduledValues(now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.04);   // ring on ~1s
        gain.gain.setValueAtTime(0.18, now + 0.95);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
      }
      return {
        start: function () {
          if (ctx) return;
          try {
            stopped = false;
            ctx = new AC();
            if (ctx.state === "suspended" && ctx.resume) { try { ctx.resume(); } catch (e) {} }
            gain = ctx.createGain(); gain.gain.value = 0.0001; gain.connect(ctx.destination);
            osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = 425; osc.connect(gain); osc.start();
            beep();
            loop = setInterval(beep, 5000); // 1s on + 4s off = 5s cycle
          } catch (e) {}
        },
        stop: function () {
          stopped = true;
          if (loop) { clearInterval(loop); loop = null; }
          try { if (osc) osc.stop(); } catch (e) {}
          try { if (ctx) ctx.close(); } catch (e) {}
          ctx = null; gain = null; osc = null;
        },
      };
    }

    function VoiceCall({ profile, onClose, onEnded, openerHistory }) {
      const [status, setStatus] = useState("connecting"); // connecting | active | ended | error
      const [mode, setMode] = useState("listening"); // speaking | listening
      const [secs, setSecs] = useState(0);

        let stopped = false;
        let conv = null;

        function getConv() { return (window.__ElevenLabs && window.__ElevenLabs.Conversation) || null; }
        function waitForSDK() {
          return new Promise(function (resolve) {
            const have = getConv();
            if (have) { resolve(have); return; }
            let done = false;
            const onReady = function () { if (done) return; done = true; resolve(getConv()); };
            window.addEventListener("elevenlabs-ready", onReady, { once: true });
            setTimeout(function () { if (done) return; done = true; resolve(getConv()); }, 9000);
          });
        }

        async function start() {
          // prompt for mic permission, then release it (the SDK re-acquires it itself)
          try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(function (t) { t.stop(); }); }
          catch (e) { if (!stopped) setStatus("error"); return; }

          // If there was recent chat, ask the backend for an opener that follows up on it.
          let firstMessage = voiceOpener(profile.name, profile.lang);
          if (openerHistory && openerHistory.length) {
            try {
              const ro = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ profile: { name: profile.name, lang: profile.lang, userGender: USER_GENDER }, messages: openerHistory, mode: "voice_opener" }) });
              if (ro.ok) { const dop = await ro.json(); if (dop && dop.opener) firstMessage = dop.opener; }
            } catch (e) {}
          }
          if (stopped) return;

          const Conversation = await waitForSDK();
          if (stopped) return;
          if (!Conversation) { setStatus("error"); return; }
          try {
            const heCall = (profile.lang === "he");
            const ovr = {
              agent: {
                prompt: { prompt: voicePersona(profile) },
                firstMessage: firstMessage,
              },
            };
            if (heCall) ovr.agent.language = "he";
            if (heCall && IL_VOICE_ID) ovr.tts = { voiceId: IL_VOICE_ID };
            const c = await Conversation.startSession({
              agentId: VOICE_AGENT_ID,
              connectionType: "websocket",
              overrides: ovr,
              onConnect: function () { if (!stopped) { connectedRef.current = true; setStatus("active"); if (econ) econ.trySpend(PRICE_VOICE_MIN); } },
              onDisconnect: function () { if (!stopped) finish(); },
              onModeChange: function (m) { if (stopped) return; const mo = m && m.mode ? m.mode : m; setMode(mo === "speaking" ? "speaking" : "listening"); },
              onError: function () { if (!stopped) setStatus("error"); },
            });
            conv = c;
            if (stopped) { try { c.endSession(); } catch (e) {} return; }
            convRef.current = c;
          } catch (e) { if (!stopped) setStatus("error"); }
        }
        start();

        return function () {
          stopped = true;
          if (conv) { try { conv.endSession(); } catch (e) {} }
          if (convRef.current) { try { convRef.current.endSession(); } catch (e) {} convRef.current = null; }
        };
      }, []);

      useEffect(function () {
        if (status !== "active") return;
        const t = setInterval(function () { setSecs(function (s) { return s + 1; }); }, 1000);
        return function () { clearInterval(t); };
      }, [status]);

      useEffect(function () {
        if (!ringRef.current) ringRef.current = makeRingback();

              <div className="flex h-full flex-col items-center justify-center px-8 text-center">
                <div className="mb-3 h-20 w-20 overflow-hidden rounded-full" style={{ boxShadow: "0 0 0 2px #FF007F, 0 0 18px rgba(255,0,127,.5)" }}>
                  <img src={posterOf(profile.id)} alt={profile.name} className="h-full w-full object-cover" />
                </div>
                <div className="font-display text-lg font-bold text-white">You matched with {profile.name}</div>
                <p className="mt-1 text-sm text-white/50">{tr("Say hi 👋 — break the ice first.")}</p>
              </div>
            )}
            {msgs.map((m, i) => (
              <div key={i} className={"flex " + (m.call ? "justify-center" : (m.from === "me" ? "justify-end" : "justify-start"))}>
                {m.call ? (
                  <div className="flex items-center gap-2 rounded-full bg-white/[0.06] px-4 py-1.5 text-xs text-white/50" style={{ boxShadow: "inset 0 0 0 1px rgba(255,255,255,.08)" }}>
                    <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .58 3.6 1 1 0 0 1-.24 1z" /></svg>
                    <span>{tr("Voice call")}</span>
                  </div>
                ) : m.generating ? (
                  <div className="flex items-center gap-2.5 rounded-2xl rounded-bl-md bg-zinc-800 px-4 py-3 text-[15px] text-white/70" style={{ boxShadow: "0 0 0 1px rgba(255,255,255,.1)" }}>
                    <span className="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/25 border-t-[#FF007F]" />
                    <span>{tr("Sending a photo…")}</span>
                  </div>
                ) : m.media ? (
                  <div className={"overflow-hidden rounded-2xl " + (m.from === "me" ? "rounded-br-md" : "rounded-bl-md")}
                    style={m.from === "me" ? { boxShadow: "0 0 0 2px rgba(255,0,127,.6), 0 0 16px rgba(255,0,127,.3)" } : { boxShadow: "0 0 0 1px rgba(255,255,255,.1)" }}>
                    {m.media.type === "video"
                      ? <video src={m.media.url} controls playsInline className="block max-h-64 w-44 bg-black object-cover" />
                      : <img src={m.media.url} alt="" onClick={() => setLightbox(m.media.url)} className="block max-h-72 w-48 cursor-pointer object-cover" />}
                  </div>
                ) : (
                  <div className={"max-w-[75%] rounded-2xl px-4 py-2 text-[15px] " + (m.from === "me" ? "rounded-br-md bg-[#FF007F] text-white" : "rounded-bl-md bg-zinc-800 text-white/90")}
                    style={m.from === "me" ? { boxShadow: "0 0 16px rgba(255,0,127,.35)" } : null}>{m.text}</div>
                )}
              </div>
            ))}
            {typing && <div className="flex justify-start"><div className="rounded-2xl rounded-bl-md bg-zinc-800 px-4 py-3"><TypingDots /></div></div>}
          </div>
          <div className="relative flex shrink-0 items-center gap-2 border-t border-white/10 px-3 py-2.5">
            {menuOpen && (
              <React.Fragment>
                <div className="fixed inset-0 z-10" onClick={() => setMenuOpen(false)} />
                <div className="absolute bottom-14 left-3 z-20 w-48 overflow-hidden rounded-2xl bg-zinc-800"
                  style={{ boxShadow: "0 0 0 1px rgba(255,255,255,.08), 0 12px 34px rgba(0,0,0,.6)" }}>
                  <button onClick={() => pick("camera")} className="flex w-full items-center gap-3 px-4 py-3 text-left text-[15px] text-white hover:bg-white/5"><span className="text-[#FF007F]"><CameraIcon /></span>{tr("Camera")}</button>
                  <button onClick={() => pick("gallery")} className="flex w-full items-center gap-3 border-t border-white/5 px-4 py-3 text-left text-[15px] text-white hover:bg-white/5"><span className="text-[#FF007F]"><ImageIcon /></span>{tr("Photo & Video")}</button>
                </div>
              </React.Fragment>
            )}
            <input ref={galleryRef} type="file" accept="image/*,video/*" onChange={onFile} className="hidden" />
            <button onClick={() => setMenuOpen((o) => !o)} aria-label={tr("Add photo or video")}
              className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-[#FF007F] transition-transform active:scale-90"
              style={{ boxShadow: "inset 0 0 0 2px rgba(255,0,127,.5)" }}><PlusIcon /></button>
            <input value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") send(); }}
              placeholder={`Message ${profile.name}...`}
              className="min-w-0 flex-1 rounded-full bg-zinc-800 px-4 py-2.5 text-[15px] text-white placeholder-white/35 outline-none focus:ring-2 focus:ring-[#FF007F]/60" />
            <button onClick={send} aria-label={tr("Send")} className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-[#FF007F] text-white" style={{ boxShadow: "0 0 18px rgba(255,0,127,.55)" }}><SendIcon /></button>
          </div>
          {cameraOpen && <CameraCapture onClose={() => setCameraOpen(false)} onCapture={(blob) => sendMedia(blob)} onGallery={() => { setCameraOpen(false); if (galleryRef.current) galleryRef.current.click(); }} />}
          {lightbox && (
            <div className="fixed inset-0 z-[95] flex items-center justify-center bg-black/90 p-4" onClick={() => setLightbox(null)}>
              <button onClick={() => setLightbox(null)} aria-label={tr("Close")} className="absolute right-4 top-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white text-2xl leading-none hover:bg-white/20">×</button>
              <img src={lightbox} alt="" onClick={(e) => e.stopPropagation()} className="max-h-[90vh] max-w-full rounded-xl object-contain" />
            </div>
          )}
          {callOpen && <VoiceCall profile={profile} onClose={() => setCallOpen(false)} onEnded={onCallEnded} openerHistory={(lastMsgAtRef.current && (Date.now() - lastMsgAtRef.current < 3600000)) ? toHistory(msgs).slice(-12) : null} />}
        </div>
      );
    }

    function ChatsScreen({ matches, goHome, openId, onOpen, onBack, user, requireAuth }) {
      const [lastMsgs, setLastMsgs] = useState({});
      const [reads, setReads] = useState(function () { return readChatReads(user && user.id ? user.id : null); });
      const prevOpenRef = useRef(null);
      const open = matches.find((m) => m.id === openId);
      const idKey = user && user.id ? user.id : null;
      const markRead = function (id) {
        setReads(function (prev) { var next = Object.assign({}, prev); next[id] = Date.now(); writeChatReads(idKey, next); return next; });
      };
      const openChat = function (id) { markRead(id); onOpen(id); };
      // A row is unread when the girl's latest message hasn't been opened yet. For a brand-new match
      // with no saved messages, that means her pending opener (only if she's a "texts first" girl).
      const isUnread = function (m) {
        var last = lastMsgs[m.id];
        var seenAt = reads[m.id] || 0;
        if (last) {
          if (last.sender !== "them") return false;
          var t = last.created_at ? new Date(last.created_at).getTime() : 0;
          return t > seenAt;
        }
        return !!m.sends && seenAt === 0;
      };

      // When viewing the list, load the latest message per conversation from the DB.
      useEffect(() => {
        let cancelled = false;
        if (user && sb && openId == null) {
          sb.from("messages").select("profile_id,sender,content,created_at").order("created_at", { ascending: false }).then(function (res) {
            if (cancelled) return;
            const map = {};
            (res.data || []).forEach(function (r) { if (!map[r.profile_id]) map[r.profile_id] = r; });
            setLastMsgs(map);
          });
        }
        return function () { cancelled = true; };
      }, [user, openId]);

      // Reload the saved read-map when the signed-in identity changes (inherit guest reads on first login).
      useEffect(function () {
        var loaded = readChatReads(idKey);
        if (idKey && Object.keys(loaded).length === 0) {
          var g = readChatReads(null);
          if (Object.keys(g).length) { loaded = g; writeChatReads(idKey, g); }
        }
        setReads(loaded);
      }, [idKey]);
      // Mark a conversation read when the user leaves it (captures everything seen during the visit).
      useEffect(function () {
        if (prevOpenRef.current != null && openId == null) markRead(prevOpenRef.current);
        prevOpenRef.current = openId;
      }, [openId]);

      if (open) return <Conversation profile={open} onBack={onBack} user={user} requireAuth={requireAuth} />;
      if (!matches.length) {
        return <EmptyTab icon={<ChatsIcon />} title={tr("No chats yet")} text={tr("Like someone and they'll match with you instantly. Then say hi.")} action={tr("Find matches")} onAction={goHome} />;
      }

      const previewText = (m) => {
        const last = lastMsgs[m.id];
        if (last) {
          const isCall = typeof last.content === "string" && last.content.indexOf("[call]") === 0;
          if (isCall) {
            return (
              <span className="inline-flex items-center gap-1 align-middle">
                <svg viewBox="0 0 24 24" className="h-3.5 w-3.5" fill="currentColor"><path d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .58 3.6 1 1 0 0 1-.24 1z" /></svg>
                <span>{tr("Voice call")}</span>
              </span>
            );
          }
          const isImg = typeof last.content === "string" && last.content.indexOf("[img]") === 0;
          if (isImg) {
            return (
              <span className="inline-flex items-center gap-1 align-middle">
                {last.sender === "me" ? <span>{tr("You:")}</span> : null}
                <svg viewBox="0 0 24 24" className="h-3.5 w-3.5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="6" width="18" height="13" rx="2" /><circle cx="12" cy="12.5" r="3.2" /><path d="M8 6l1.4-2h5.2L20 6" /></svg>
                <span>{tr("Photo")}</span>
              </span>
            );
          }
          return (last.sender === "me" ? tr("You:") + " " : "") + last.content;
        }
        return m.sends ? m.preview : "You matched — say hi 👋";
      };
      const ordered = matches.slice().sort(function (a, b) {
        const ta = lastMsgs[a.id] ? new Date(lastMsgs[a.id].created_at).getTime() : 0;
        const tb = lastMsgs[b.id] ? new Date(lastMsgs[b.id].created_at).getTime() : 0;
        return tb - ta;
      });

      return (
        <div className="no-scrollbar h-full overflow-y-auto pt-2 pb-6">
          <h2 className="mb-3 px-4 font-display text-2xl font-bold">{tr("Chats")}</h2>
          <div className="mb-1 px-4 text-xs font-semibold uppercase tracking-wider text-[#FF007F]/80">{tr("New matches")}</div>
          <div className="no-scrollbar mb-3 flex gap-3 overflow-x-auto px-4 pb-1">
            {matches.map((m) => (
              <button key={m.id} onClick={() => openChat(m.id)} className="flex w-16 shrink-0 flex-col items-center gap-1">
                <div className="h-16 w-16 overflow-hidden rounded-full" style={{ boxShadow: "0 0 0 2px #FF007F, 0 0 14px rgba(255,0,127,.5)" }}>
                  <img src={posterOf(m.id)} alt={m.name} className="h-full w-full object-cover" />
                </div>
                <span className="w-full truncate text-center text-[11px] text-white/70">{m.name}</span>
              </button>
            ))}
          </div>
          <div className="border-t border-white/10">
            {ordered.map((m) => {
              const last = lastMsgs[m.id];
              const unread = isUnread(m);
              return (
              <button key={m.id} onClick={() => openChat(m.id)} className="flex w-full items-center gap-3 px-4 py-3 text-left hover:bg-white/5">
                <img src={posterOf(m.id)} alt={m.name} className="h-14 w-14 shrink-0 rounded-full object-cover" />
                <div className="min-w-0 flex-1 border-b border-white/5 pb-3">
                  <div className="flex items-center justify-between">
                    <span className="font-display font-bold">{m.name}</span>
                    {last
                      ? <span className="text-[11px] text-white/40">{fmtTime(last.created_at)}</span>
                      : (m.sends
                        ? <span className="text-[11px] text-white/40">{m.time}</span>
                        : <span className="rounded-full bg-[#FF007F]/20 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-[#FF007F]">{tr("New")}</span>)}
                  </div>
                  <div className="flex items-center gap-2">
                    <p className={"min-w-0 flex-1 truncate text-sm " + (unread ? "font-semibold text-white" : ((last || m.sends) ? "text-white/55" : "text-[#FF007F]/80"))}>{previewText(m)}</p>
                    {unread ? <span className="h-2.5 w-2.5 shrink-0 rounded-full bg-[#FF007F]" style={{ boxShadow: "0 0 8px rgba(255,0,127,.85)" }} /> : null}
                  </div>
                </div>
              </button>
              );
            })}
          </div>
        </div>
      );
    }

    /* ---------------- Profile sub-screen controls ---------------- */
    const inputCls = "w-full rounded-xl bg-white/[0.05] px-4 py-3 text-[15px] text-white placeholder-white/30 outline-none focus:ring-2 focus:ring-[#FF007F]/60";
    function Field({ label, children }) {
      return (<div className="mt-5"><div className="mb-1.5 text-xs font-semibold uppercase tracking-wider text-white/40">{label}</div>{children}</div>);
    }
    function Toggle({ on, onChange, disabled }) {
      return (
        <button onClick={() => !disabled && onChange(!on)} role="switch" aria-checked={on} disabled={disabled}
          className="relative h-7 w-12 shrink-0 rounded-full transition-colors disabled:opacity-40"
          style={{ backgroundColor: on ? PINK : "#3f3f46", boxShadow: on && !disabled ? "0 0 12px rgba(255,0,127,.5)" : "none" }}>
          <span className="absolute top-1 h-5 w-5 rounded-full bg-white transition-all" style={{ left: on ? "26px" : "4px" }} />
        </button>
      );
    }
    function Segmented({ options, value, onChange }) {
      return (
        <div className="flex rounded-full bg-white/[0.06] p-1">
          {options.map((o) => (
            <button key={o} onClick={() => onChange(o)}
              className={"flex-1 rounded-full px-3 py-1.5 text-sm font-semibold transition-colors " + (value === o ? "text-white" : "text-white/55")}
              style={value === o ? { background: PINK, boxShadow: "0 0 14px rgba(255,0,127,.5)" } : null}>{tr(o)}</button>
          ))}
        </div>
      );
    }
    function RangeSingle({ min, max, value, onChange }) {
      const pct = ((value - min) / (max - min)) * 100;
      return (
        <div dir="ltr" className="relative h-6 select-none">
          <div className="absolute top-1/2 h-1 w-full -translate-y-1/2 rounded-full bg-zinc-700" />
          <div className="absolute top-1/2 h-1 -translate-y-1/2 rounded-full" style={{ left: 0, width: pct + "%", background: PINK, boxShadow: "0 0 8px rgba(255,0,127,.6)" }} />
          <input type="range" min={min} max={max} value={value} onChange={(e) => onChange(+e.target.value)} className="range-thumb absolute inset-0 w-full" />
        </div>
      );
    }
    function RangeDual({ min, max, value, onChange }) {
      const [lo, hi] = value;
      const pct = (v) => ((v - min) / (max - min)) * 100;
      return (
        <div dir="ltr" className="relative h-6 select-none">
          <div className="absolute top-1/2 h-1 w-full -translate-y-1/2 rounded-full bg-zinc-700" />
          <div className="absolute top-1/2 h-1 -translate-y-1/2 rounded-full" style={{ left: pct(lo) + "%", right: (100 - pct(hi)) + "%", background: PINK, boxShadow: "0 0 8px rgba(255,0,127,.6)" }} />
          <input type="range" min={min} max={max} value={lo} onChange={(e) => onChange([Math.min(+e.target.value, hi - 1), hi])} className="range-thumb absolute inset-0 w-full" />
          <input type="range" min={min} max={max} value={hi} onChange={(e) => onChange([lo, Math.max(+e.target.value, lo + 1)])} className="range-thumb absolute inset-0 w-full" />
        </div>
      );
    }
    function SubHeader({ title, onBack, right }) {
      return (
        <div className="flex shrink-0 items-center gap-3 border-b border-white/10 px-2 py-3">
          <button onClick={onBack} aria-label={tr("Back")} className="p-1 text-white/80"><BackIcon /></button>
          <h2 className="font-display text-lg font-bold">{title}</h2>
          {right && <div className="ml-auto">{right}</div>}
        </div>
      );
    }
    function SettingsGroup({ title, children }) {
      return (
        <div className="mt-5">
          {title && <div className="mb-2 px-1 text-xs font-semibold uppercase tracking-wider text-white/40">{title}</div>}
          <div className="divide-y divide-white/5 overflow-hidden rounded-2xl bg-white/[0.04]">{children}</div>
        </div>
      );
    }
    function ToggleRow({ label, desc, on, onChange, disabled }) {
      return (
        <div className={"flex items-center gap-3 px-4 py-3.5 " + (disabled ? "opacity-50" : "")}>
          <div className="flex-1"><div className="text-[15px]">{label}</div>{desc && <div className="mt-0.5 text-xs text-white/45">{desc}</div>}</div>
          <Toggle on={on} onChange={onChange} disabled={disabled} />
        </div>
      );
    }
    function InfoRow({ label, value }) {
      return (<div className="flex items-center justify-between px-4 py-3.5"><span className="text-[15px]">{label}</span><span className="text-sm text-white/45">{value}</span></div>);
    }
    function SelectField({ value, options, onChange, title, placeholder }) {
      const [open, setOpen] = useState(false);
      return (
        <React.Fragment>
          <button onClick={() => setOpen(true)} className="flex w-full items-center justify-between rounded-xl bg-white/[0.05] px-4 py-3 text-[15px] text-white transition-colors hover:bg-white/[0.08]">
            <span className={(value != null && value !== "") ? "" : "text-white/35"}>{(value != null && value !== "") ? value : (placeholder || "Select")}</span>
            <span className="text-white/40"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6" /></svg></span>
          </button>
          {open && <PickerSheet title={title} value={value} options={options} onSelect={(v) => { onChange(v); setOpen(false); }} onClose={() => setOpen(false)} />}
        </React.Fragment>
      );
    }
    function PickerSheet({ title, value, options, onSelect, onClose }) {
      const listRef = useRef(null);
      useEffect(() => {
        const el = listRef.current && listRef.current.querySelector('[data-sel="1"]');
        if (el && el.scrollIntoView) el.scrollIntoView({ block: "center" });
      }, []);
      return (
        <div className="fixed inset-0 z-[70] flex flex-col items-center justify-end">
          <div className="anim-match absolute inset-0 bg-black/60" onClick={onClose} />
          <div className="anim-sheet relative z-10 w-full max-w-[440px] rounded-t-3xl bg-zinc-900 pb-5" style={{ boxShadow: "0 -12px 40px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,0,127,.2)" }}>
            <div className="mx-auto mt-3 h-1.5 w-10 rounded-full bg-white/15" />
            <div className="flex items-center justify-between px-5 py-3">
              <button onClick={onClose} className="text-sm font-semibold text-white/50">{tr("Cancel")}</button>
              <div className="font-display font-bold">{title}</div>
              <div className="w-12" />
            </div>
            <div ref={listRef} className="no-scrollbar max-h-[46vh] overflow-y-auto px-3 pb-2">
              {options.map((o) => {
                const sel = o === value;
                return (
                  <button key={o} data-sel={sel ? "1" : "0"} onClick={() => onSelect(o)}
                    className={"mb-1 flex w-full items-center justify-between rounded-xl px-4 py-3 text-[15px] transition-colors " + (sel ? "font-bold text-white" : "text-white/70 hover:bg-white/5")}
                    style={sel ? { background: "rgba(255,0,127,.16)", boxShadow: "inset 0 0 0 1px rgba(255,0,127,.5)" } : null}>
                    <span>{o}</span>
                    {sel && <span className="text-[#FF007F]"><CheckIcon /></span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ---------------- Edit profile ---------------- */
    function ProfileEdit({ me, onSave, onBack }) {
      const [d, setD] = useState(me);
      const set = (k, v) => setD((p) => ({ ...p, [k]: v }));
      const ALL_INTERESTS = ["Music", "Coffee", "Travel", "Art", "Hiking", "Gaming", "Foodie", "Photography", "Fitness", "Movies", "Dancing", "Reading", "Wine", "Yoga", "Pets", "Cooking"];
      const AGES = Array.from({ length: 83 }, (_, i) => 18 + i);
      const toggleInterest = (t) => set("interests", d.interests.includes(t) ? d.interests.filter((x) => x !== t) : (d.interests.length < 8 ? [...d.interests, t] : d.interests));
      const save = () => { onSave(d); onBack(); };
      return (
        <div className="flex h-full flex-col">
          <SubHeader title={tr("Edit Profile")} onBack={onBack} right={
            <button onClick={save} className="rounded-full bg-[#FF007F] px-4 py-1.5 text-sm font-bold text-white" style={{ boxShadow: "0 0 16px rgba(255,0,127,.5)" }}>{tr("Save")}</button>
          } />
          <div className="no-scrollbar flex-1 overflow-y-auto px-5 py-5">
            <div className="px-1 text-xs font-semibold uppercase tracking-wider text-white/40">{tr("Photos")}</div>
            <div className="mt-2 grid grid-cols-3 gap-2">
              {[0, 1, 2, 3, 4, 5].map((i) => (
                <div key={i} className="relative aspect-[3/4] overflow-hidden rounded-xl">
                  {i === 0 ? (
                    <div className="flex h-full w-full items-center justify-center" style={{ background: "linear-gradient(135deg,#FF007F,#00E5FF)" }}>
                      <span className="font-display text-3xl font-bold text-white">{(d.name[0] || "A").toUpperCase()}</span>
                    </div>
                  ) : (
                    <button className="flex h-full w-full items-center justify-center border-2 border-dashed border-white/15 bg-white/[0.03] text-white/30">
                      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14" /></svg>
                    </button>
                  )}
                  {i === 0 && <span className="absolute bottom-1 left-1 rounded bg-black/60 px-1.5 py-0.5 text-[9px] font-bold uppercase text-white">{tr("Main")}</span>}
                </div>
              ))}
            </div>
            <Field label={tr("First name")}><input value={d.name} onChange={(e) => set("name", e.target.value)} className={inputCls} /></Field>
            <Field label="Age"><SelectField value={d.age} options={AGES} onChange={(v) => set("age", v)} title={tr("Your age")} placeholder={tr("Add your age")} /></Field>

    function AuthModal({ onClose }) {
      const [mode, setMode] = useState("signup");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      const submit = async () => {
        setErr("");
        if (!email.trim() || password.length < 6) { setErr(tr("Enter a valid email and a password of at least 6 characters.")); return; }
        if (!sb) { setErr(tr("Sign in isn't available right now. Please try again later.")); return; }
        setBusy(true);
        try {
          const res = mode === "signup"
            ? await sb.auth.signUp({ email: email.trim(), password: password })
            : await sb.auth.signInWithPassword({ email: email.trim(), password: password });
          if (res.error) { setErr(res.error.message); setBusy(false); return; }
          onClose();
        } catch (e) {
          setErr(String((e && e.message) || e)); setBusy(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[80] flex items-center justify-center p-5">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose} />
          <div className="anim-up relative z-10 w-full max-w-[380px] rounded-3xl bg-zinc-900 p-6" style={{ boxShadow: "0 20px 60px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,0,127,.25)" }}>
            <button onClick={onClose} aria-label={tr("Close")} className="absolute right-4 top-4 text-white/40 hover:text-white">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18" /></svg>
            </button>
            <div className="mb-2 flex items-center gap-2"><PulseLogo /><span className="font-display text-base font-bold tracking-wider">Your AI Babe</span></div>
            <h2 className="font-display text-2xl font-bold">{mode === "signup" ? tr("Create your account") : tr("Welcome back")}</h2>
            <p className="mt-1 mb-5 text-sm text-white/55">{mode === "signup" ? tr("Sign up to start chatting with your matches.") : tr("Log in to continue your conversations.")}</p>

            {mode === "signup" ? (
              <div className="mb-5 flex items-center gap-3 rounded-2xl bg-[#FFB627]/10 px-4 py-3" style={{ boxShadow: "inset 0 0 0 1px rgba(255,182,39,.3)" }}>
                <CoinIcon size={30} />
                <div className="text-sm leading-tight">
                  <div className="font-bold text-[#FFB627]">{tr("50 BABE Coins free 🎁")}</div>
                  <div className="text-white/50">{tr("Get them instantly when you sign up.")}</div>
                </div>
              </div>
            ) : null}

            <label className="mb-1 block text-xs font-semibold uppercase tracking-wider text-white/45">{tr("Email")}</label>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" autoComplete="email"
              className="mb-3 w-full rounded-xl bg-white/[0.06] px-4 py-3 text-[15px] text-white outline-none focus:ring-2 focus:ring-[#FF007F]/50" />
            <label className="mb-1 block text-xs font-semibold uppercase tracking-wider text-white/45">{tr("Password")}</label>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder={tr("At least 6 characters")} autoComplete={mode === "signup" ? "new-password" : "current-password"}
              onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
              className="mb-2 w-full rounded-xl bg-white/[0.06] px-4 py-3 text-[15px] text-white outline-none focus:ring-2 focus:ring-[#FF007F]/50" />

            {err ? <p className="mb-1 mt-1 text-sm text-red-400">{err}</p> : null}

            <button onClick={submit} disabled={busy}
              className="mt-3 w-full rounded-xl bg-gradient-to-r from-[#FF007F] to-[#FF4D9E] py-3 font-display text-[15px] font-bold text-white shadow-[0_8px_24px_rgba(255,0,127,.4)] transition active:scale-[0.98] disabled:opacity-60">
              {busy ? tr("Please wait…") : (mode === "signup" ? tr("Sign up") : tr("Log in"))}
            </button>

            <div className="mt-4 text-center text-sm text-white/55">
              {mode === "signup" ? tr("Already have an account? ") : tr("New here? ")}
              <button onClick={() => { setErr(""); setMode(mode === "signup" ? "login" : "signup"); }} className="font-semibold text-[#FF007F]">
                {mode === "signup" ? tr("Log in") : tr("Sign up")}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Toast({ text }) {
      return (
        <div className="pointer-events-none fixed inset-x-0 top-6 z-[120] flex justify-center px-4">
          <div className="anim-up rounded-full bg-[#FF007F] px-5 py-2.5 text-sm font-bold text-white" style={{ boxShadow: "0 8px 30px rgba(255,0,127,.5)" }}>{text}</div>
        </div>
      );
    }

    function CoinPill({ coins, onClick }) {
      return (
        <button onClick={onClick} className="flex items-center gap-1.5 rounded-full bg-[#FFB627]/15 px-3 py-1.5 text-sm font-bold text-[#FFB627] transition-transform active:scale-90" style={{ boxShadow: "inset 0 0 0 1px rgba(255,182,39,.35)" }}>
          <CoinIcon size={16} />
          <span>{coins}</span>
        </button>
      );
    }

    function ShopModal({ reason, plan, onClose, onSubscribe, onBuyPack }) {
      const [cycle, setCycle] = useState("yearly");
      const [sel, setSel] = useState("premium");
      const key = sel + (cycle === "yearly" ? "_y" : "_m");
      const info = PLAN_INFO[key];
      const reasonText = reason === "coins" ? "You're out of BABE Coins" : reason === "swipes" ? "You're out of free likes for today" : null;

      function planCard(tier) {
        const k = tier + (cycle === "yearly" ? "_y" : "_m");
        const pi = PLAN_INFO[k];
        const active = sel === tier;
        const isDeluxe = tier === "deluxe";
        const owned = plan === k;
        return (
          <button onClick={() => setSel(tier)} className="relative flex-1 rounded-2xl p-4 text-left transition-all"
            style={{ background: active ? (isDeluxe ? "rgba(255,182,39,.08)" : "rgba(255,0,127,.08)") : "rgba(255,255,255,.03)", boxShadow: active ? (isDeluxe ? "inset 0 0 0 2px #FFB627" : "inset 0 0 0 2px #FF007F") : "inset 0 0 0 1px rgba(255,255,255,.08)" }}>
            {isDeluxe && <span className="absolute -top-2 right-3 rounded-full bg-[#FFB627] px-2 py-0.5 text-[10px] font-extrabold uppercase tracking-wide text-black" style={{ boxShadow: "0 0 14px rgba(255,182,39,.7)" }}>{tr("Best Value")}</span>}
            <div className={"text-sm font-bold " + (isDeluxe ? "text-[#FFB627]" : "text-[#FF007F]")}>{tr(pi.label)}</div>
            <div className="mt-1 flex items-end gap-1"><span className="font-display text-2xl font-extrabold text-white">{pi.priceMo}</span><span className="pb-1 text-xs text-white/40">{tr("/mo")}</span></div>
            <div className="text-xs text-white/30 line-through">{pi.was}{tr("/mo")}</div>
            {cycle === "yearly" ? <div className="mt-1 text-xs font-semibold text-emerald-400">+{pi.bonus.toLocaleString()} bonus coins</div> : null}
            {owned ? <div className="mt-1 text-[11px] font-bold text-white/60">{tr("Current plan")}</div> : null}
          </button>
        );
      }

      return (
        <div className="fixed inset-0 z-[110] flex items-end justify-center sm:items-center">
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose} />
          <div className="anim-sheet no-scrollbar relative z-10 max-h-[92vh] w-full max-w-[440px] overflow-y-auto rounded-t-3xl bg-[#0d0d0f] p-5 pb-8 sm:rounded-3xl" style={{ boxShadow: "0 -10px 60px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.06)" }}>
            <div className="mb-1 flex items-center justify-between">
              <h2 className="font-display text-2xl font-extrabold text-white">Go <span className="text-[#FF007F]">{tr("Premium")}</span></h2>
              <button onClick={onClose} aria-label={tr("Close")} className="flex h-9 w-9 items-center justify-center rounded-full bg-white/10 text-xl text-white hover:bg-white/20">×</button>
            </div>
            {reasonText
              ? <p className="mb-4 text-sm text-[#FFB627]">{reasonText} — unlock more below.</p>
              : <p className="mb-4 text-sm text-white/45">{tr("Unlock everything Your AI Babe has to offer.")}</p>}

            <div className="mb-4 flex rounded-full bg-white/[0.06] p-1 text-sm font-semibold">
              <button onClick={() => setCycle("monthly")} className={"flex-1 rounded-full py-2 " + (cycle === "monthly" ? "bg-white/15 text-white" : "text-white/50")}>{tr("Monthly")}</button>
              <button onClick={() => setCycle("yearly")} className={"flex-1 rounded-full py-2 " + (cycle === "yearly" ? "bg-white/15 text-white" : "text-white/50")}>Yearly <span className="text-emerald-400">{tr("Save 50%")}</span></button>
            </div>

            <div className="flex gap-3">{planCard("premium")}{planCard("deluxe")}</div>
            <div className="mt-3 text-center text-xs text-white/40">{info.billed}{info.note ? <div className="mt-0.5 text-emerald-400">{info.note}</div> : null}</div>

            <button onClick={() => onSubscribe(key)} className={"mt-4 w-full rounded-2xl py-3.5 font-bold transition-transform active:scale-[0.98] " + (sel === "deluxe" ? "bg-gradient-to-r from-[#FFB627] to-[#ff9500] text-black" : "bg-gradient-to-r from-[#FF007F] to-[#ff4fa3] text-white")} style={{ boxShadow: sel === "deluxe" ? "0 0 26px rgba(255,182,39,.5)" : "0 0 26px rgba(255,0,127,.5)" }}>
              {tr("Subscribe to")} {tr(info.label)}
            </button>
            <p className="mt-2 text-center text-xs text-white/30">{tr("Private & secure · Cancel anytime · Demo mode")}</p>

            <div className="mb-2 mt-7 text-sm font-bold uppercase tracking-wider text-white/40">{tr("BABE Coin packs")}</div>
            <div className="space-y-2.5">
              {COIN_PACKS.map(function (pack) {
                return (
                  <div key={pack.coins} className="flex items-center gap-3 rounded-2xl bg-white/[0.04] p-3" style={{ boxShadow: pack.popular ? "inset 0 0 0 1.5px rgba(255,0,127,.5)" : "inset 0 0 0 1px rgba(255,255,255,.07)" }}>
                    <CoinIcon size={26} />
                    <div className="flex-1">
                      <div className="font-bold text-white">{pack.coins.toLocaleString()} <span className="text-white/50">{tr("coins")}</span>{pack.popular ? <span className="ml-2 rounded-full bg-[#FF007F]/20 px-2 py-0.5 text-[10px] font-bold uppercase text-[#FF007F]">{tr("Popular")}</span> : null}</div>
                    </div>
                    <button onClick={() => onBuyPack(pack.coins)} className="rounded-full bg-[#FF007F] px-4 py-2 text-sm font-bold text-white transition-transform active:scale-90" style={{ boxShadow: "0 0 16px rgba(255,0,127,.4)" }}>{pack.price}</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("home");
      const [liked, setLiked] = useState([]);
      const [matchProfile, setMatchProfile] = useState(null);
      const [chatOpenId, setChatOpenId] = useState(null);
      const [detailProfile, setDetailProfile] = useState(null);
      const [me, setMe] = useState(GUEST_ME);
      const [settings, setSettings] = useState({ showMe: "Women", distance: 25, ageRange: [22, 35], global: false, showDistance: true, showAge: true, incognito: false });
      const [notifs, setNotifs] = useState({ push: true, matches: true, messages: true, likes: true, superLikes: false, promos: false, email: false });
      const [profileView, setProfileView] = useState(null);
      const [session, setSession] = useState(null);
      const [authOpen, setAuthOpen] = useState(false);
      const [wallet, setWallet] = useState(null);
      const [shop, setShop] = useState(null);
      const [toast, setToast] = useState(null);
      const [dbGirls, setDbGirls] = useState([]);
      const [region, setRegion] = useState(function () {
        try { return localStorage.getItem("pulse_edition") === "il" ? "il" : "global"; } catch (e) { return "global"; }
      });
      const changeRegion = function (r) {
        const next = (r === "il") ? "il" : "global";
        UI_LANG = (next === "il") ? "he" : "en";
        try { localStorage.setItem("pulse_edition", next); } catch (e) {}
        setRegion(next);
      };
      useEffect(function () {
        var he = (region === "il");
        UI_LANG = he ? "he" : "en";
        try {
          document.documentElement.setAttribute("dir", he ? "rtl" : "ltr");
          document.documentElement.setAttribute("lang", he ? "he" : "en");
          if (he) { document.body.classList.add("he-ui"); } else { document.body.classList.remove("he-ui"); }
        } catch (e) {}
      }, [region]);
      useEffect(function () { USER_GENDER = (me && me.gender === "Woman") ? "female" : "male"; }, [me]);
      const [girlsLoaded, setGirlsLoaded] = useState(false);
      const walletRef = useRef(null);
      const user = session ? session.user : null;

      // Watch auth state.
      useEffect(() => {
        if (!sb) return;
        sb.auth.getSession().then(function (res) { setSession(res.data.session); });
        const sub = sb.auth.onAuthStateChange(function (_e, s) { setSession(s); });
        return function () { if (sub && sub.data && sub.data.subscription) sub.data.subscription.unsubscribe(); };
      }, []);

      // Load likes from the right place; on login, merge guest likes into the account first.
      useEffect(() => {
        let cancelled = false;
        async function load() {
          if (user && sb) {
            const guest = readGuestLikes();
            if (guest.length) {
              await sb.from("likes").upsert(guest.map(function (id) { return { user_id: user.id, profile_id: id }; }), { onConflict: "user_id,profile_id", ignoreDuplicates: true });
              writeGuestLikes([]);
            }
            const res = await sb.from("likes").select("profile_id");
            if (cancelled) return;
            setLiked((res.data || []).map(function (r) { return idToProfile(r.profile_id); }).filter(Boolean));
          } else {
            if (cancelled) return;
            setLiked(readGuestLikes().map(idToProfile).filter(Boolean));
          }
        }
        load();
        return function () { cancelled = true; };
      }, [user, dbGirls]);

      // Load the signed-in user's editable profile (name, age, bio…) from the database.
      useEffect(() => {
        let cancelled = false;
        if (user && sb) {
          const fallbackName = (user.user_metadata && user.user_metadata.name) ? user.user_metadata.name : (user.email ? user.email.split("@")[0] : "You");
          sb.from("profiles").select("name,age,city,job,gender,bio,interests").eq("id", user.id).maybeSingle().then(function (res) {
            if (cancelled) return;
            const row = res.data;
            setMe({
              name: (row && row.name) ? row.name : fallbackName,
              age: (row && row.age) ? row.age : null,
              city: (row && row.city) ? row.city : "",
              job: (row && row.job) ? row.job : "",
              gender: (row && row.gender) ? row.gender : "Man",
              bio: (row && row.bio) ? row.bio : "",
              interests: (row && Array.isArray(row.interests)) ? row.interests : [],
            });
          });
        } else {
          setMe(GUEST_ME);
        }
        return function () { cancelled = true; };
      }, [user]);

      const goTab = (t) => { setProfileView(null); setChatOpenId(null); setTab(t); };
      const requireAuth = () => setAuthOpen(true);

      // Load (or create) the user's wallet.
      useEffect(() => {
        let cancelled = false;
        if (user && sb) {
          sb.from("wallets").select("coins,plan,swipes_used,swipes_reset").eq("user_id", user.id).maybeSingle().then(function (res) {
            if (cancelled) return;
            if (res.data) { walletRef.current = res.data; setWallet(res.data); }
            else {
              const w = { coins: START_COINS, plan: "free", swipes_used: 0, swipes_reset: new Date().toISOString() };
              sb.from("wallets").insert([{ user_id: user.id, coins: w.coins, plan: w.plan, swipes_used: 0, swipes_reset: w.swipes_reset }]).then(function () {});
              walletRef.current = w; setWallet(w);
            }
          });
        } else {
          walletRef.current = null; setWallet(null);
        }
        return function () { cancelled = true; };
      }, [user]);

      // Load database-driven girls for the ACTIVE edition and register their media.
      useEffect(() => {
        if (!sb) return;
        let cancelled = false;
        const ed = EDITIONS[region] || EDITIONS.global;
        // Switching editions: clear the previous lineup + its media so nothing bleeds across.
        setGirlsLoaded(false);
        setDbGirls([]);
        window.MEDIA = {};
        window.POSTERS = {};
        sb.from(ed.table).select("*").eq("active", true).order("sort", { ascending: true }).then(function (res) {
          if (cancelled) return;
          if (res.data) {
            const mapped = res.data.map(dbRowToProfile);
            mapped.forEach(function (p) {
              p.refBucket = ed.refBucket;
              p.vidBucket = ed.vidBucket;
              p.lang = (ed.table === "girls_il") ? "he" : "en";
              PROFILE_INDEX[p.id] = p;
              if (p.videoFile) window.MEDIA[p.id] = STORAGE_BASE + ed.vidBucket + "/" + p.videoFile;
              if (p.imageFile) window.POSTERS[p.id] = STORAGE_BASE + ed.refBucket + "/" + p.imageFile;
            });
            setDbGirls(mapped);
          }
          setGirlsLoaded(true);
        });
        return function () { cancelled = true; };
      }, [region]);

      const allProfiles = React.useMemo(function () { return dbGirls.concat(PROFILES); }, [dbGirls]);

      // Which girls text first after a match: ~1/3 of them, chosen at random, then SAVED in the browser
      // (keyed per user, or "guest" before login) so a refresh keeps the same set instead of re-rolling.
      const senderIds = React.useMemo(function () {
        return resolveSenders(allProfiles, user && user.id ? user.id : null);
      }, [allProfiles, user]);

      const showToast = (msg) => { setToast(msg); setTimeout(function () { setToast(null); }, 2600); };
      const applyWallet = (next) => {
        walletRef.current = next;
        setWallet(next);
        if (user && sb) sb.from("wallets").update({ coins: next.coins, plan: next.plan, swipes_used: next.swipes_used, swipes_reset: next.swipes_reset, plan_since: next.plan_since || null, updated_at: new Date().toISOString() }).eq("user_id", user.id).then(function () {});
      };
      const openShop = (reason) => setShop({ reason: reason || null });
      const trySpend = (n) => {
        const w = walletRef.current;
        if (!w || w.coins < n) return false;
        applyWallet(Object.assign({}, w, { coins: w.coins - n }));
        return true;
      };
      const spend = (n) => { if (trySpend(n)) return true; openShop("coins"); return false; };
      const subscribe = (planKey) => {
        const inf = PLAN_INFO[planKey]; const w = walletRef.current; if (!w || !inf) return;
        applyWallet(Object.assign({}, w, { coins: w.coins + inf.grant + (inf.bonus || 0), plan: planKey, plan_since: new Date().toISOString() }));
        setShop(null); showToast(tr("Purchase Successful! 🎉"));
      };
      const buyPack = (coins) => {
        const w = walletRef.current; if (!w) return;
        applyWallet(Object.assign({}, w, { coins: w.coins + coins }));
        showToast(tr("Purchase Successful! 🎉"));
      };
      const registerSwipe = () => {
        const w = walletRef.current;
        if (!w || (w.plan && w.plan !== "free")) return true;
        const reset = new Date(w.swipes_reset).getTime();
        if (Date.now() - reset > SWIPE_WINDOW_MS) { applyWallet(Object.assign({}, w, { swipes_used: 1, swipes_reset: new Date().toISOString() })); return true; }
        if (w.swipes_used >= FREE_SWIPES) return false;
        applyWallet(Object.assign({}, w, { swipes_used: w.swipes_used + 1 }));
        return true;
      };
      const econ = {
        coins: wallet ? wallet.coins : 0,
        plan: wallet ? wallet.plan : "free",
        isPaid: !!(wallet && wallet.plan && wallet.plan !== "free"),
        loggedIn: !!user,
        spend: spend, trySpend: trySpend, openShop: openShop,
      };

      const saveMe = (next) => {
        setMe(next);
        if (user && sb) {
          sb.from("profiles").upsert([{ id: user.id, name: next.name, age: next.age, city: next.city, job: next.job, gender: next.gender, bio: next.bio, interests: next.interests, updated_at: new Date().toISOString() }], { onConflict: "id" }).then(function () {});
        }
      };

      const addLike = (profile) => {
        if (user && !registerSwipe()) { openShop("swipes"); return; }
        setLiked((prev) => prev.some((p) => p.id === profile.id) ? prev : [...prev, profile]);
        setMatchProfile(profile);
        if (user && sb) {
          sb.from("likes").upsert([{ user_id: user.id, profile_id: profile.id }], { onConflict: "user_id,profile_id", ignoreDuplicates: true }).then(function () {});
        } else {
          const ids = readGuestLikes();
          if (ids.indexOf(profile.id) === -1) { ids.push(profile.id); writeGuestLikes(ids); }
        }
      };
      const undoLike = (id) => {
        setLiked((prev) => prev.filter((p) => p.id !== id));
        setMatchProfile((m) => (m && m.id === id ? null : m));
        setChatOpenId((c) => (c === id ? null : c));
        if (user && sb) {
          sb.from("likes").delete().eq("profile_id", id).then(function () {});
        } else {
          writeGuestLikes(readGuestLikes().filter(function (x) { return x !== id; }));
        }
      };

      const matches = liked.map((p) => {
        const sends = senderIds.has(p.id);
        return { ...p, sends, preview: sends ? openerFor(p.id) : null, time: sends ? "now" : "" };
      });

      const goToChat = (id) => { setMatchProfile(null); setDetailProfile(null); setTab("chats"); setChatOpenId(id); };
      const likeFromDetail = (p) => { setDetailProfile(null); addLike(p); };
      const logout = () => { if (sb) sb.auth.signOut(); setTab("home"); setProfileView(null); setChatOpenId(null); };
      const chatting = tab === "chats" && chatOpenId != null && matches.some((m) => m.id === chatOpenId);
      const profileSubOpen = tab === "profile" && profileView != null;
      const hideChrome = chatting || profileSubOpen;
      const homeActive = tab === "home" && !matchProfile && !detailProfile;

      return (
        <EconomyContext.Provider value={econ}>
        <div className="fixed inset-0 z-10 flex justify-center lg:items-center lg:gap-12 xl:gap-16 lg:p-8">
          <div aria-hidden className="pointer-events-none absolute inset-0 hidden overflow-hidden lg:block">
            <div className="absolute -left-32 top-1/4 h-96 w-96 rounded-full bg-[#FF007F]/20 blur-[120px]" />
            <div className="absolute -right-24 bottom-0 h-[28rem] w-[28rem] rounded-full bg-[#00E5FF]/15 blur-[130px]" />
          </div>

          <DesktopAside />

          <div className="relative z-10 flex w-full max-w-[440px] flex-col overflow-hidden lg:h-[min(860px,90vh)] lg:rounded-[44px] lg:bg-black lg:shadow-[0_30px_90px_rgba(0,0,0,.65)] lg:ring-1 lg:ring-white/10">
          {!hideChrome && (
            <header className="relative flex shrink-0 items-center justify-center gap-2 pt-5 pb-2.5">
              <BrandMark region={region} />
              {user && wallet ? <div className="absolute right-4 top-1/2 -translate-y-1/2"><CoinPill coins={wallet.coins} onClick={() => openShop()} /></div> : null}
            </header>
          )}

          <div className="relative flex-1 overflow-hidden">
            <div className={tab === "home" ? "h-full" : "hidden"}>
              <HomeScreen onLike={addLike} onUndoLike={undoLike} onOpenDetail={setDetailProfile} active={homeActive} profiles={allProfiles} loading={!girlsLoaded} />
            </div>
            {tab === "explore" && <ExploreScreen onOpen={setDetailProfile} profiles={allProfiles} />}
            {tab === "likes" && <LikesScreen liked={liked} goHome={() => setTab("home")} onOpen={setDetailProfile} />}
            {tab === "chats" && <ChatsScreen matches={matches} goHome={() => setTab("home")} openId={chatOpenId} onOpen={setChatOpenId} onBack={() => setChatOpenId(null)} user={user} requireAuth={requireAuth} />}
            {tab === "profile" && <ProfileScreen me={me} setMe={saveMe} settings={settings} setSettings={setSettings} notifs={notifs} setNotifs={setNotifs} view={profileView} setView={setProfileView} user={user} onLogin={requireAuth} onLogout={logout} region={region} setRegion={changeRegion} />}
          </div>

          {!hideChrome && <TabBar tab={tab} setTab={goTab} likeCount={liked.length} />}

          {detailProfile && (
            <ProfileDetail profile={detailProfile} isMatched={liked.some((p) => p.id === detailProfile.id)}
              onClose={() => setDetailProfile(null)} onLike={() => likeFromDetail(detailProfile)}
              onNope={() => setDetailProfile(null)} onMessage={() => goToChat(detailProfile.id)} />
          )}

          {matchProfile && (
            <MatchOverlay profile={matchProfile} onMessage={() => goToChat(matchProfile.id)} onKeepSwiping={() => setMatchProfile(null)} />
          )}

          {authOpen && <AuthModal onClose={() => setAuthOpen(false)} />}
          {shop && <ShopModal reason={shop.reason} plan={wallet ? wallet.plan : "free"} onClose={() => setShop(null)} onSubscribe={subscribe} onBuyPack={buyPack} />}
          {toast && <Toast text={toast} />}
          </div>
        </div>
        </EconomyContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
